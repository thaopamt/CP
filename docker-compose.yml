services:
  # ── NestJS API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: cp-api:latest
    container_name: cp_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - cp_uploads:/app/uploads
    ports:
      - "127.0.0.1:3000:3000"

  # ── React Web (Nginx) ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: cp-web:latest
    container_name: cp_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:80"

  # ── Piston (Code Execution) ────────────────────────────────────────
  piston:
    build:
      context: ./docker/piston
      dockerfile: Dockerfile
    container_name: piston_api
    restart: unless-stopped
    environment:
      - PISTON_RUN_TIMEOUT=${PISTON_RUN_TIMEOUT:-30000}
      - PISTON_COMPILE_TIMEOUT=${PISTON_COMPILE_TIMEOUT:-30000}
      - PISTON_RUN_MEMORY_LIMIT=${PISTON_RUN_MEMORY_LIMIT:-512000000}
      - PISTON_COMPILE_MEMORY_LIMIT=${PISTON_COMPILE_MEMORY_LIMIT:-512000000}
      - PISTON_OUTPUT_MAX_SIZE=${PISTON_OUTPUT_MAX_SIZE:-10485760}
    ports:
      - "127.0.0.1:2000:2000"
    volumes:
      - piston_packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec,uid=1000,gid=1000
    privileged: true

  # ── Redis Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cp_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    volumes:
      - cp_redis_data:/data

volumes:
  piston_packages:
  cp_uploads:
  cp_redis_data:
