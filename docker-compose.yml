services:
  # ── NestJS API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: cp-api:latest
    container_name: cp_api
    restart: unless-stopped
    env_file:
      - .env
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:3000:3000"

  # ── React Web (Nginx) ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: cp-web:latest
    container_name: cp_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:80"

  # ── Piston (Code Execution) ────────────────────────────────────────
  piston:
    build:
      context: ./docker/piston
      dockerfile: Dockerfile
    container_name: piston_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:2000:2000"
    volumes:
      - piston_packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec,uid=1000,gid=1000
    privileged: true

volumes:
  piston_packages:
