<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Assign Assignments to Course</title>

<body class="bg-surface-container-highest min-h-screen font-body-md text-on-surface flex items-center justify-center p-md">
<!-- Modal Backdrop -->
<div aria-hidden="true" class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-sm z-40"></div>
<!-- Modal Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-lg w-full max-w-4xl max-h-[921px] flex flex-col z-50 overflow-hidden border border-outline-variant">
<!-- Modal Header -->
<div class="flex items-center justify-between p-lg border-b border-outline-variant bg-surface-container-lowest">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Assign Assignments to Course</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Select tasks to build your curriculum module.</p>
</div>
<button aria-label="Close modal" class="p-sm text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-lowest">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="flex-1 overflow-y-auto p-lg bg-surface">
<!-- Filters & Search -->
<div class="flex flex-col md:flex-row gap-md mb-lg">
<!-- Search -->
<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="search">search</span>
<input class="w-full pl-[48px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Search assignments..." type="text"/>
</div>
<!-- Filters -->
<div class="flex gap-sm overflow-x-auto pb-sm md:pb-0 hide-scrollbar">
<select class="bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-label-sm text-label-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary appearance-none cursor-pointer min-w-[120px]">
<option value="">Subject</option>
<option value="math">Mathematics</option>
<option value="science">Computer Science</option>
<option value="literature">Literature</option>
</select>
<select class="bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-label-sm text-label-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary appearance-none cursor-pointer min-w-[120px]">
<option value="">Difficulty</option>
<option value="beginner">Beginner</option>
<option value="intermediate">Intermediate</option>
<option value="advanced">Advanced</option>
</select>
<select class="bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-label-sm text-label-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary appearance-none cursor-pointer min-w-[120px]">
<option value="">Type</option>
<option value="quiz">Quiz</option>
<option value="coding">Coding</option>
<option value="writing">Writing</option>
</select>
</div>
</div>
<!-- Assignment List -->
<div class="space-y-sm">
<!-- Assignment Item 1 -->
<label class="flex items-start md:items-center gap-md p-md bg-surface-container-lowest border border-outline-variant rounded-lg hover:border-primary-fixed-dim cursor-pointer transition-colors group relative">
<div class="pt-1 md:pt-0">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container-lowest cursor-pointer mt-1 md:mt-0" type="checkbox"/>
</div>
<div class="flex-1 min-w-0">
<div class="flex items-center gap-sm mb-xs">
<span class="inline-flex items-center px-2 py-1 rounded-full bg-secondary-container text-on-secondary-container font-label-sm text-[12px]">Coding</span>
<span class="inline-flex items-center px-2 py-1 rounded-full bg-surface-variant text-on-surface-variant font-label-sm text-[12px]">Intermediate</span>
</div>
<h3 class="font-label-sm text-label-sm text-on-surface truncate">Data Structures: Binary Search Trees</h3>
<p class="font-body-md text-[14px] text-on-surface-variant truncate mt-xs">Implement insertion and deletion operations in a BST.</p>
</div>
<button aria-label="Preview Assignment" class="hidden md:flex items-center gap-xs px-md py-sm bg-surface-container hover:bg-surface-variant text-on-surface font-label-sm text-label-sm rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary absolute right-md top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="visibility">visibility</span>
                        Preview
                    </button>
<button aria-label="Preview Assignment" class="md:hidden p-sm text-primary">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</label>
<!-- Assignment Item 2 -->
<label class="flex items-start md:items-center gap-md p-md bg-surface-container-lowest border border-outline-variant rounded-lg hover:border-primary-fixed-dim cursor-pointer transition-colors group relative">
<div class="pt-1 md:pt-0">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container-lowest cursor-pointer mt-1 md:mt-0" type="checkbox"/>
</div>
<div class="flex-1 min-w-0">
<div class="flex items-center gap-sm mb-xs">
<span class="inline-flex items-center px-2 py-1 rounded-full bg-tertiary-container text-on-tertiary-container font-label-sm text-[12px]">Quiz</span>
<span class="inline-flex items-center px-2 py-1 rounded-full bg-surface-variant text-on-surface-variant font-label-sm text-[12px]">Beginner</span>
</div>
<h3 class="font-label-sm text-label-sm text-on-surface truncate">Introduction to Algorithms concepts</h3>
<p class="font-body-md text-[14px] text-on-surface-variant truncate mt-xs">Multiple choice questions covering Big O notation basics.</p>
</div>
<button aria-label="Preview Assignment" class="hidden md:flex items-center gap-xs px-md py-sm bg-surface-container hover:bg-surface-variant text-on-surface font-label-sm text-label-sm rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary absolute right-md top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="visibility">visibility</span>
                        Preview
                    </button>
<button aria-label="Preview Assignment" class="md:hidden p-sm text-primary">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</label>
<!-- Assignment Item 3 -->
<label class="flex items-start md:items-center gap-md p-md bg-primary-container/5 border-2 border-primary rounded-lg cursor-pointer transition-colors group relative">
<div class="pt-1 md:pt-0">
<input checked="" class="w-5 h-5 rounded border-primary text-primary focus:ring-primary focus:ring-offset-surface-container-lowest cursor-pointer mt-1 md:mt-0" type="checkbox"/>
</div>
<div class="flex-1 min-w-0">
<div class="flex items-center gap-sm mb-xs">
<span class="inline-flex items-center px-2 py-1 rounded-full bg-secondary-container text-on-secondary-container font-label-sm text-[12px]">Writing</span>
<span class="inline-flex items-center px-2 py-1 rounded-full bg-surface-variant text-on-surface-variant font-label-sm text-[12px]">Advanced</span>
</div>
<h3 class="font-label-sm text-label-sm text-on-surface truncate">Analysis of Sorting Algorithms</h3>
<p class="font-body-md text-[14px] text-on-surface-variant truncate mt-xs">Write a comparative essay on Quick Sort vs Merge Sort efficiency.</p>
</div>
<button aria-label="Preview Assignment" class="hidden md:flex items-center gap-xs px-md py-sm bg-surface-container hover:bg-surface-variant text-on-surface font-label-sm text-label-sm rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary absolute right-md top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="visibility">visibility</span>
                        Preview
                    </button>
<button aria-label="Preview Assignment" class="md:hidden p-sm text-primary">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</label>
<!-- Assignment Item 4 -->
<label class="flex items-start md:items-center gap-md p-md bg-surface-container-lowest border border-outline-variant rounded-lg hover:border-primary-fixed-dim cursor-pointer transition-colors group relative">
<div class="pt-1 md:pt-0">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container-lowest cursor-pointer mt-1 md:mt-0" type="checkbox"/>
</div>
<div class="flex-1 min-w-0">
<div class="flex items-center gap-sm mb-xs">
<span class="inline-flex items-center px-2 py-1 rounded-full bg-secondary-container text-on-secondary-container font-label-sm text-[12px]">Coding</span>
<span class="inline-flex items-center px-2 py-1 rounded-full bg-surface-variant text-on-surface-variant font-label-sm text-[12px]">Intermediate</span>
</div>
<h3 class="font-label-sm text-label-sm text-on-surface truncate">Graph Traversal: BFS and DFS</h3>
<p class="font-body-md text-[14px] text-on-surface-variant truncate mt-xs">Implement Breadth-First and Depth-First search on a directed graph.</p>
</div>
<button aria-label="Preview Assignment" class="hidden md:flex items-center gap-xs px-md py-sm bg-surface-container hover:bg-surface-variant text-on-surface font-label-sm text-label-sm rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary absolute right-md top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="visibility">visibility</span>
                        Preview
                    </button>
<button aria-label="Preview Assignment" class="md:hidden p-sm text-primary">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</label>
</div>
</div>
<!-- Modal Footer -->
<div class="p-lg border-t border-outline-variant bg-surface-container-lowest flex items-center justify-between">
<span class="font-body-md text-label-sm text-on-surface-variant">1 selected</span>
<div class="flex gap-md">
<button class="px-lg py-sm font-label-sm text-label-sm text-primary hover:bg-surface-container rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
                    Cancel
                </button>
<button class="px-lg py-sm font-label-sm text-label-sm bg-primary text-on-primary hover:brightness-95 rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-lowest shadow-sm flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]" data-icon="add_task">add_task</span>
                    Add to Course
                </button>
</div>
</div>
</div>
<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
