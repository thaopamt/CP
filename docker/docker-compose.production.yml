services:
  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-cp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cp}
      POSTGRES_DB: ${DB_NAME:-cp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ──────────────────────────────────────────────────────
  api:
    build:
      context: ../
      dockerfile: docker/api/Dockerfile
    image: cp-api:latest
    container_name: cp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-cp}
      DB_PASSWORD: ${DB_PASSWORD:-cp}
      DB_NAME: ${DB_NAME:-cp}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://cp.thaopamt.site}
      PISTON_API_URL: http://piston_api:2000/api/v2/execute
      PISTON_CONTAINER: piston_api
      PISTON_MAX_MEMORY_LIMIT_BYTES: ${PISTON_MAX_MEMORY_LIMIT_BYTES:-512000000}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:3000:3000"

  # ── React Web (Nginx) ──────────────────────────────────────────────
  web:
    build:
      context: ../
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: cp-web:latest
    container_name: cp_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:80"

  # ── Piston (Code Execution) ────────────────────────────────────────
  piston:
    build:
      context: ./piston
      dockerfile: Dockerfile
    container_name: piston_api
    restart: unless-stopped
    environment:
      - PISTON_RUN_TIMEOUT=30000
      - PISTON_COMPILE_TIMEOUT=30000
      - PISTON_RUN_MEMORY_LIMIT=${PISTON_MAX_MEMORY_LIMIT_BYTES:-512000000}
      - PISTON_COMPILE_MEMORY_LIMIT=${PISTON_MAX_MEMORY_LIMIT_BYTES:-512000000}
    ports:
      - "127.0.0.1:2000:2000"
    volumes:
      - piston_packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec,uid=1000,gid=1000
    privileged: true

volumes:
  postgres_data:
  piston_packages:
